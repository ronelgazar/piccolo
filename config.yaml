display:
  width: 1920
  height: 1080
  fullscreen: true
  fps: 60
  monitor: 1
cameras:
  backend: opencv
  left:
    index: 2
    width: 1920
    height: 1080
    flip_180: true
  right:
    index: 1
    width: 1920
    height: 1080
    flip_180: true
  test_mode: false
stereo:
  aspect_mode: full
  zoom:
    min: 1.0
    max: 5.0
    step: 0.01
    tick_ms: 100
  convergence:
    base_offset: 0
    step: 1
    auto_adjust: true
  alignment:
    enabled: true
    interval_sec: 2.0
    min_matches: 12
    max_features: 1500
    match_ratio: 0.75
    ransac_thresh: 2.0
    max_correction_px: 25
    max_correction_deg: 1.0
    smoothing: 0.55
    detection_scale: 0.5
calibration:
  crosshair_color:
  - 0
  - 255
  - 0
  crosshair_thickness: 2
  crosshair_size: 40
  blink_interval_sec: 1.0
  blink_cycles: 3
calibration_state:
  nudge_left_x: 0
  nudge_right_x: -6
  nudge_left_y: 0
  nudge_right_y: -236
  convergence_offset: 0
  joint_zoom_center: 50
  joint_zoom_center_y: 50
controls:
  zoom_in:
  - EQUALS
  - a
  zoom_out:
  - MINUS
  - c
  converge_in: RIGHTBRACKET
  converge_out: LEFTBRACKET
  toggle_calibration: \
  toggle_alignment: m
  calib_next: n
  calib_nudge_left: LEFT
  calib_nudge_right: RIGHT
  reset: r
  quit: ESCAPE
  pedal_key_a: a
  pedal_key_b: b
  pedal_key_c: c
  pedal_mode_a: zoom
  pedal_mode_b: side
  pedal_mode_c: updown
  pedal_repeat_ms: 100
