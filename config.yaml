display:
  width: 1920
  height: 1080
  fullscreen: true
  fps: 60
  monitor: 1
cameras:
  backend: opencv
  left:
    index: 2
    width: 640
    height: 480
    fps: 60
    decode_backend: turbojpeg
    flip_180: true
  right:
    index: 1
    width: 640
    height: 480
    fps: 60
    decode_backend: turbojpeg
    flip_180: true
  test_mode: false
stereo:
  zoom:
    min: 1.0
    max: 5.0
    step: 0.01
    tick_ms: 100
  convergence:
    base_offset: 0
    step: 1
    auto_adjust: true
  alignment:
    enabled: true
    interval_sec: 2.0
    min_matches: 12
    max_features: 1500
    match_ratio: 0.75
    ransac_thresh: 2.0
    max_correction_px: 25
    max_correction_deg: 1.0
    smoothing: 0.55
    detection_scale: 0.5
    mask_overlap: false
  aspect_mode: full
calibration:
  crosshair_color:
  - 0
  - 255
  - 0
  crosshair_thickness: 2
  crosshair_size: 40
  blink_interval_sec: 1.0
  blink_cycles: 3
calibration_state:
  nudge_left_x: 0
  nudge_right_x: -34
  nudge_left_y: 0
  nudge_right_y: -72
  convergence_offset: 0
  joint_zoom_center: 50
  joint_zoom_center_y: 50
  scale_left_pct: 100
  scale_right_pct: 100
  smart_overlap_mode: live
  smart_overlap_pair_count: 8
  alignment_dy: 0.0
  alignment_dtheta_deg: 0.0
  alignment_locked: false
stereo_calibration:
  focal_length_mm: 10.0
  sensor_width_mm: 5.37
  sensor_height_mm: 4.04
  focal_length_px: 1000.0
  baseline_mm: 60.0
  depth_ruler_near_mm: 60.0
  depth_ruler_far_mm: 600.0
  depth_downscale: 0.5
  num_disparities: 96
  block_size: 15
performance:
  low_latency_mode: false
  use_gpu_for_depth: true
  use_gpu_pipeline: true
  latency_watermark: false
  use_gl_display: false
controls:
  zoom_in:
  - EQUALS
  - a
  zoom_out:
  - MINUS
  - c
  converge_in: RIGHTBRACKET
  converge_out: LEFTBRACKET
  toggle_calibration: \
  toggle_alignment: m
  calib_next: n
  calib_nudge_left: LEFT
  calib_nudge_right: RIGHT
  reset: r
  quit: ESCAPE
  pedal_key_a: a
  pedal_key_b: b
  pedal_key_c: c
  pedal_mode_a: zoom
  pedal_mode_b: side
  pedal_mode_c: updown
  pedal_repeat_ms: 100
